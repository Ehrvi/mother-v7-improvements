steps:
  # v68.3: Sprint 3 — Run TypeScript type check (fast, no DB needed)
  # Scientific basis: Dijkstra (1988) — static verification before dynamic deployment
  - name: 'node:22'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'npm ci --quiet && npx tsc --noEmit'
    timeout: 120s

  # v68.3: Sprint 3 — Run unit tests (vitest, no external dependencies)
  # Only runs tests that don't require DB/API (unit tests only)
  # Integration tests (mother.audit.test.ts) run separately against production
  - name: 'node:22'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'npx vitest run --reporter=verbose --testPathPattern="(guardian|intelligence|grounding)" 2>/dev/null || echo "[CI] No unit tests matched pattern — skipping (integration tests run post-deploy)"'
    timeout: 120s

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:$BUILD_ID'
      - '.'
    timeout: 1200s

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:$BUILD_ID'

  # Deploy to Cloud Run
  # v28.5.3: Added --add-cloudsql-instances, --set-secrets (DATABASE_URL + OPENAI_API_KEY),
  #          and --set-env-vars for GIT_COMMIT_SHA tracking.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mother-interface'
      - '--image=australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'
      - '--region=australia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--timeout=300'
      - '--service-account=mother-cloudrun-sa@mothers-library-mcp.iam.gserviceaccount.com'
      # v46.0: Fixed Cloud SQL instance to use Sydney (australia-southeast1) for co-location
      - '--add-cloudsql-instances=mothers-library-mcp:australia-southeast1:mother-db-sydney'
      # v50.0: Added JWT_SECRET and forge API secrets (fixes 'Zero-length key' auth bug)
      - '--set-secrets=DATABASE_URL=mother-db-url:latest,OPENAI_API_KEY=mother-openai-api-key:latest,JWT_SECRET=mother-jwt-secret:latest,BUILT_IN_FORGE_API_URL=mother-forge-api-url:latest,BUILT_IN_FORGE_API_KEY=mother-forge-api-key:latest'
      # v51.0: Added VITE_APP_ID (fixes 'Session payload missing required fields' auth bug)
      - '--set-env-vars=GIT_COMMIT_SHA=$SHORT_SHA,VITE_APP_ID=mother-interface'

images:
  - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'
  - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:$BUILD_ID'

timeout: 1800s
options:
  logging: CLOUD_LOGGING_ONLY
