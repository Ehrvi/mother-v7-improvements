steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:$BUILD_ID'
      - '.'
    timeout: 1200s

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:$BUILD_ID'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mother-interface'
      - '--image=australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'
      - '--region=australia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--concurrency=10'
      - '--max-instances=10'
      - '--timeout=300'
      - '--set-env-vars=GIT_COMMIT_SHA=$SHORT_SHA'
      # PATCH v28.5: Inject DATABASE_URL from Secret Manager
      - '--set-secrets=DATABASE_URL=mother-db-url:latest'
      # PATCH v28.5.1: Enable Cloud SQL Proxy for Unix socket connection
      - '--add-cloudsql-instances=mothers-library-mcp:us-central1:mother-db'

images:
  - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'
  - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:$BUILD_ID'

# Build options - CRITICAL: Use CLOUD_LOGGING_ONLY to fix service account error
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY  # FIX: Required when using service account
  substitutionOption: 'ALLOW_LOOSE'

timeout: 1800s
