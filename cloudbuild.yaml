steps:
  # v68.4: Sprint 4 C203-R001 — Run TypeScript type check (fast, no DB needed)
  # Scientific basis: Dijkstra (1988) — static verification before dynamic deployment
  # Uses pnpm (project package manager) to install dependencies
  - name: 'node:22'
    entrypoint: 'sh'
    env:
      - 'COREPACK_ENABLE_STRICT=0'
    args:
      - '-c'
      - 'npm install -g pnpm@10.15.1 --quiet && pnpm install --frozen-lockfile --quiet && npx tsc --noEmit'
    timeout: 300s

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:$BUILD_ID'
      - '.'
    timeout: 1200s

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:$BUILD_ID'

  # Deploy to Cloud Run
  # v68.8: Multi-provider cascade router — added ANTHROPIC, GOOGLE_AI, DEEPSEEK, MISTRAL secrets
  # v28.5.3: Added --add-cloudsql-instances, --set-secrets (DATABASE_URL + OPENAI_API_KEY),
  #          and --set-env-vars for GIT_COMMIT_SHA tracking.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mother-interface'
      - '--image=australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'
      - '--region=australia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      # v69.8: PERMANENT FIX — 4Gi prevents OOM crashes (heap limit exceeded)
      # Scientific basis: Node.js V8 heap = memory * 0.75. 4Gi -> 3072MB heap.
      - '--memory=4Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--timeout=300'
      - '--service-account=mother-cloudrun-sa@mothers-library-mcp.iam.gserviceaccount.com'
      # v46.0: Fixed Cloud SQL instance to use Sydney (australia-southeast1) for co-location
      - '--add-cloudsql-instances=mothers-library-mcp:australia-southeast1:mother-db-sydney'
      # v50.0: Added JWT_SECRET and forge API secrets (fixes 'Zero-length key' auth bug)
      # v74.2: Added GITHUB_TOKEN — enables DGM autonomous-update-job to push code changes
      # Scientific basis: McConnell (2004) Defensive Programming — env config must be explicit
      # v78.4: Ciclo 105 — Added OPENAI_API_KEY_EXTRA_SVCACCT (NC-CLOUDBUILD-001 fix)
      # Scientific basis: AWAKE V207 Regra 107 — sk-svcacct-... from project 'Extra' is required
      # to access DPO v8e model in :personal: namespace. Without this, every CI/CD build loses the key.
      - '--set-secrets=DATABASE_URL=mother-db-url:latest,OPENAI_API_KEY=mother-openai-api-key:latest,JWT_SECRET=mother-jwt-secret:latest,BUILT_IN_FORGE_API_URL=mother-forge-api-url:latest,BUILT_IN_FORGE_API_KEY=mother-forge-api-key:latest,ANTHROPIC_API_KEY=mother-anthropic-api-key:latest,GOOGLE_AI_API_KEY=mother-google-ai-api-key:latest,DEEPSEEK_API_KEY=mother-deepseek-api-key:latest,MISTRAL_API_KEY=mother-mistral-api-key:latest,GITHUB_TOKEN=mother-github-token:latest,OPENAI_API_KEY_EXTRA_SVCACCT=mother-openai-extra-svcacct:latest'
      # v51.0: Added VITE_APP_ID (fixes 'Session payload missing required fields' auth bug)
      # v69.8: NODE_OPTIONS permanent fix — max-old-space-size=3072 prevents heap OOM
      # NC-CLOUDBUILD-002 Ciclo 108: DPO_FINE_TUNED_MODEL added permanently
      # Scientific basis: AWAKE V212 Regra 107 — DPO v8e must survive every CI/CD cycle
      # Without this, each new revision loses the fine-tuned model and falls back to gpt-4o-mini
      - '--set-env-vars=GIT_COMMIT_SHA=$SHORT_SHA,VITE_APP_ID=mother-interface,NODE_OPTIONS=--max-old-space-size=3072,DPO_FINE_TUNED_MODEL=ft:gpt-4.1-mini-2025-04-14:personal:mother-v82-dpo-v8e:DFay6MHy'

  # v74.5: DGM-2 FIX — Migrate 100% traffic to new revision after deploy
  # gcloud run deploy does not have --traffic flag; use update-traffic separately
  # Fixes: v74.3/v74.4 revisions created but received 0% traffic (Retired state)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'mother-interface'
      - '--to-latest'
      - '--region=australia-southeast1'
      - '--platform=managed'
      - '--project=mothers-library-mcp'

  # Ciclo 113: HELM-lite auto-trigger after successful deploy
  # Scientific basis: HELM (arXiv:2211.09110) + DARWIN (arXiv:2602.02534)
  # Automatically runs benchmark after each deploy to generate proof
  - name: 'gcr.io/cloud-builders/curl'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        sleep 30 && curl -s -X POST https://mother-interface-qtvghovzxa-ts.a.run.app/api/a2a/benchmark/trigger \
          -H "Content-Type: application/json" \
          -d "{\"source\":\"cloudbuild\",\"commit\":\"$SHORT_SHA\"}" || echo "HELM-lite trigger sent (non-blocking)"
    timeout: 60s
images:
  - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:latest'
  - 'australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface:$BUILD_ID'

timeout: 1800s
options:
  logging: CLOUD_LOGGING_ONLY
