name: MOTHER Autonomous Deploy Pipeline

# ============================================================
# MOTHER Autonomous CI/CD Pipeline
# Scientific basis: SWE-agent (Xia et al., 2025), DGM (Zhang et al., 2025)
#
# Triggers:
#   1. Push to master: Full build + deploy to Cloud Run (production)
#   2. Push to autonomous/*: Test + auto-merge to master
#   3. workflow_dispatch: Manual trigger for testing
# ============================================================

on:
  push:
    branches:
      - master
      - 'autonomous/**'
      - 'feature/auto-*'
  workflow_dispatch:
    inputs:
      proposal_id:
        description: 'Proposal ID being deployed'
        required: false
        type: string

env:
  PROJECT_ID: mothers-library-mcp
  REGION: australia-southeast1
  SERVICE: mother-interface
  REGISTRY: australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface

jobs:
  # ============================================================
  # JOB 1: TypeScript Compilation Check
  # ============================================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript compilation check
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Report success
        run: echo "✅ TypeScript compilation successful"

  # ============================================================
  # JOB 2: Auto-merge autonomous branches (if tests pass)
  # Only runs on autonomous/* or feature/auto-* branches
  # ============================================================
  auto-merge:
    name: Auto-merge Autonomous Branch
    runs-on: ubuntu-latest
    needs: typecheck
    if: startsWith(github.ref, 'refs/heads/autonomous/') || startsWith(github.ref, 'refs/heads/feature/auto-')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "MOTHER Autonomous Agent"
          git config user.email "mother@intelltech.ai"

      - name: Merge to master
        run: |
          git checkout master
          git pull origin master
          git merge --no-ff ${{ github.ref_name }} -m "🤖 auto-merge: ${{ github.ref_name }} [autonomous update]"
          git push origin master
          echo "✅ Autonomous branch merged to master"

  # ============================================================
  # JOB 3: Build and Deploy to Cloud Run (master only)
  # ============================================================
  deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}:latest \
            -t ${{ env.REGISTRY }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}:latest
          docker push ${{ env.REGISTRY }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGISTRY }}:latest \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi \
            --cpu=2 \
            --min-instances=1 \
            --max-instances=10 \
            --timeout=300 \
            --service-account=mother-cloudrun-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:mother-db-sydney \
            --set-secrets=DATABASE_URL=mother-db-url:latest,OPENAI_API_KEY=mother-openai-api-key:latest,JWT_SECRET=mother-jwt-secret:latest,BUILT_IN_FORGE_API_URL=mother-forge-api-url:latest,BUILT_IN_FORGE_API_KEY=mother-forge-api-key:latest,GITHUB_TOKEN=mother-github-token:latest \
            --set-env-vars=GIT_COMMIT_SHA=${{ github.sha }},VITE_APP_ID=mother-interface

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Deployed to: $URL"
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/trpc/mother.stats")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed!"
            exit 1
          fi
          echo "✅ Deployment verified successfully!"
          echo "MOTHER v$(date +%Y%m%d) is live at $URL"
