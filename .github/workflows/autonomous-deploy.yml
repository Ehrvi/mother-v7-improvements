name: MOTHER Autonomous Deploy Pipeline

# ============================================================
# MOTHER Autonomous CI/CD Pipeline
# Scientific basis: SWE-agent (Yang et al., 2024), DGM (Zhang et al., 2025)
#
# Triggers:
#   1. Push to master/main: TypeScript check + Cloud Run deploy
#   2. Push to autonomous/*: TypeScript check + auto-merge to master
#   3. workflow_dispatch: Manual trigger
# NC-CICD-001 (Ciclo 49): Added 'main' branch to triggers
# Scientific basis: GitFlow (Driessen, 2010) — both main and master should trigger production deploy
# Root cause: previous deploys to 'main' were silently ignored, requiring manual workflow_dispatch
#
# AUTH: Workload Identity Federation (WIF) — C184
# Replaces static GCP_SA_KEY with keyless OIDC token exchange.
# Scientific basis: Google Cloud WIF (2021), OIDC RFC 8705 (2020)
# Pool: projects/233196174701/locations/global/workloadIdentityPools/github-actions-pool
# Provider: .../providers/github-provider
# Condition: assertion.repository_owner == 'Ehrvi' (scoped to this org only)
# ============================================================

on:
  push:
    branches:
      - master
      - main  # NC-CICD-001: Ciclo 49 — main branch now triggers deploy
      - 'autonomous/**'
      - 'feature/auto-*'
  workflow_dispatch:
    inputs:
      proposal_id:
        description: 'Proposal ID being deployed'
        required: false
        type: string

env:
  PROJECT_ID: mothers-library-mcp
  REGION: australia-southeast1
  SERVICE: mother-interface
  REGISTRY: australia-southeast1-docker.pkg.dev/mothers-library-mcp/mother-repo/mother-interface
  # WIF identifiers (C184 — replaces GCP_SA_KEY secret)
  WIF_PROVIDER: projects/233196174701/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: mother-cloudrun-sa@mothers-library-mcp.iam.gserviceaccount.com

jobs:
  # ============================================================
  # JOB 1: TypeScript Compilation Check
  # Uses npm (native to GitHub Actions runner) for reliability
  # ============================================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript compilation check
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Report success
        run: echo "✅ TypeScript compilation successful — 0 errors"

  # ============================================================
  # JOB 2: Auto-merge autonomous branches (if tests pass)
  # Only runs on autonomous/* or feature/auto-* branches
  # ============================================================
  auto-merge:
    name: Auto-merge Autonomous Branch
    runs-on: ubuntu-latest
    needs: typecheck
    if: startsWith(github.ref, 'refs/heads/autonomous/') || startsWith(github.ref, 'refs/heads/feature/auto-')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "MOTHER Autonomous Agent"
          git config user.email "mother@intelltech.ai"

      - name: Merge to master
        run: |
          git checkout master
          git pull origin master
          git merge --no-ff ${{ github.ref_name }} -m "🤖 auto-merge: ${{ github.ref_name }} [autonomous update]"
          git push origin master
          echo "✅ Autonomous branch merged to master"

  # ============================================================
  # JOB 3: Build and Deploy to Cloud Run (master only)
  # Authentication: Workload Identity Federation (WIF) — C184
  # No long-lived credentials stored in GitHub Secrets.
  # OIDC token issued by GitHub → exchanged for short-lived GCP token.
  # ============================================================
  deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    needs: typecheck
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push'  # NC-CICD-001: Deploy from both master and main

    # Required for WIF: id-token permission allows the runner to request an OIDC token
    permissions:
      contents: read
      id-token: write  # CRITICAL: required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF — keyless)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          # No credentials_json needed — OIDC token exchange is fully automatic

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}:latest \
            -t ${{ env.REGISTRY }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}:latest
          docker push ${{ env.REGISTRY }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.REGISTRY }}:latest \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=8Gi \
            --cpu=4 \
            --min-instances=0 \
            --max-instances=20 \
            --timeout=300 \
            --service-account=mother-cloudrun-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:mother-db-sydney \
            --set-secrets=DATABASE_URL=mother-db-url:latest,OPENAI_API_KEY=mother-openai-api-key:latest,JWT_SECRET=mother-jwt-secret:latest,BUILT_IN_FORGE_API_URL=mother-forge-api-url:latest,BUILT_IN_FORGE_API_KEY=mother-forge-api-key:latest,GITHUB_TOKEN=mother-github-token:latest,ANTHROPIC_API_KEY=mother-anthropic-api-key:latest,GOOGLE_AI_API_KEY=mother-google-ai-api-key:latest,DEEPSEEK_API_KEY=mother-deepseek-api-key:latest,MISTRAL_API_KEY=mother-mistral-api-key:latest \
            --set-env-vars=GIT_COMMIT_SHA=${{ github.sha }},VITE_APP_ID=mother-interface,DPO_FINE_TUNED_MODEL=ft:gpt-4.1-mini-2025-04-14:personal:mother-v82-dpo-v8e:DFay6MHy,NODE_OPTIONS=--max-old-space-size=6144,MOTHER_VERSION=v122.36,MOTHER_CYCLE=368,SHMS_SIMULATION_ONLY=false,MOTHER_CITATION_DEBUG=true,MOTHER_COMPLEXITY_THRESHOLD=4,MOTHER_STEALTH_PLANNER=true,MOTHER_PRM_ENABLED=true,MOTHER_CITATION_ENGINE=true,MOTHER_VERTE_RAG=true,MOTHER_ADAPTIVE_THRESHOLD=true,TIMESCALE_DB_URL=postgres://tsdbadmin:kbdtdc719antdsw4@np88jyj5mj.e8uars6xuw.tsdb.cloud.timescale.com:31052/tsdb?sslmode=require

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Deployed to: $URL"
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/trpc/mother.stats")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed!"
            exit 1
          fi
          echo "✅ MOTHER is live at $URL"
