<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHMS — Checklist de Teste Completo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0a0c14; --surface: #10131c; --card: #141722; --border: #1e2233;
    --text: #e8eaf0; --muted: #6b7294; --accent: #38bdf8;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
    --font: 'Inter', system-ui, sans-serif; --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; padding: 24px; max-width: 900px; margin: 0 auto; }

  h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
  .progress-bar { height: 8px; border-radius: 4px; background: var(--surface); margin-bottom: 24px; overflow: hidden; border: 1px solid var(--border); }
  .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--green), var(--accent)); transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: var(--mono); }

  .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .section-header { padding: 14px 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); transition: background 0.2s; }
  .section-header:hover { background: rgba(56,189,248,0.04); }
  .section-icon { font-size: 18px; }
  .section-title { font-size: 14px; font-weight: 700; flex: 1; }
  .section-count { font-size: 11px; font-family: var(--mono); padding: 2px 8px; border-radius: 6px; background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .section-body { padding: 8px 18px 14px; }
  .section.collapsed .section-body { display: none; }
  .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
  .section.collapsed .chevron { transform: rotate(-90deg); }

  .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type="checkbox"] { appearance: none; width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; flex-shrink: 0; margin-top: 2px; transition: all 0.2s; position: relative; }
  .check-item input[type="checkbox"]:checked { background: var(--green); border-color: var(--green); }
  .check-item input[type="checkbox"]:checked::after { content: '✓'; position: absolute; top: -1px; left: 3px; font-size: 12px; font-weight: 800; color: #000; }
  .check-item.checked .check-label { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(107,114,148,0.4); }

  .check-label { font-size: 13px; flex: 1; cursor: pointer; }
  .check-label strong { font-weight: 600; color: var(--accent); }
  .check-label code { font-family: var(--mono); font-size: 11px; padding: 1px 5px; background: var(--surface); border-radius: 4px; border: 1px solid var(--border); }
  .check-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tag { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
  .tag-critical { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .tag-important { background: rgba(234,179,8,0.15); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
  .tag-nav { background: rgba(56,189,248,0.1); color: var(--accent); border: 1px solid rgba(56,189,248,0.2); }
  .tag-api { background: rgba(168,85,247,0.15); color: #a78bfa; border: 1px solid rgba(168,85,247,0.3); }

  .link { color: var(--accent); text-decoration: none; font-family: var(--mono); font-size: 11px; }
  .link:hover { text-decoration: underline; }

  .reset-btn { display: inline-block; padding: 8px 16px; border-radius: 8px; background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
  .reset-btn:hover { background: rgba(239,68,68,0.2); }
  .export-btn { display: inline-block; padding: 8px 16px; border-radius: 8px; background: rgba(56,189,248,0.1); color: var(--accent); border: 1px solid rgba(56,189,248,0.3); font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 16px; margin-left: 8px; transition: all 0.2s; }
  .export-btn:hover { background: rgba(56,189,248,0.2); }

  .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); text-align: center; }
</style>

    ]

  {
    icon: '🔧', title: 'Compilação & Infraestrutura',
    items: [
      { id: 'infra-01', label: '<code>npx tsc --noEmit</code> → <strong>0 errors</strong>', sub: 'Zero erros de tipo TypeScript', tags: ['critical'] },
      { id: 'infra-02', label: '<code>npx tsx tests/benchmark_validation.ts</code> → ALL PASS', sub: 'Benchmark 4: Bishop/Spencer/M-P dentro de ±15%', tags: ['critical'] },
      { id: 'infra-03', label: 'HMR (Hot Module Replacement) funciona ao editar arquivo', sub: 'Salvar .tsx → browser atualiza', tags: [] },

const STORAGE_KEY = 'shms-test-checklist-v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function render() {
  const state = loadState();
  const container = document.getElementById('sections');
  container.innerHTML = '';
  let total = 0, checked = 0;

  CHECKLIST.forEach((section, si) => {
    const div = document.createElement('div');
    div.className = 'section' + (state[`section-${si}-collapsed`] ? ' collapsed' : '');

    let sectionChecked = 0;
    section.items.forEach(item => { total++; if (state[item.id]) { checked++; sectionChecked++; } });

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si})">
        <span class="section-icon">${section.icon}</span>
        <span class="section-title">${section.title}</span>
        <span class="section-count">${sectionChecked}/${section.items.length}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        ${section.items.map(item => {
          const isChecked = !!state[item.id];
          const tags = (item.tags || []).map(t => `<span class="tag tag-${t}">${t}</span>`).join('');
          return `
            <div class="check-item ${isChecked ? 'checked' : ''}">
              <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggle('${item.id}')">
              <div>
                <label class="check-label" onclick="toggle('${item.id}')">${item.label} ${tags}</label>
                <div class="check-sub">${item.sub}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;
    container.appendChild(div);
  });

  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progressFill').style.width = `${pct}%`;
  document.getElementById('progressLabel').textContent = `${checked} / ${total} (${pct}%)`;
}

function toggle(id) {
  const state = loadState();
  state[id] = !state[id];
  saveState(state);
  render();
}

function toggleSection(idx) {
  const state = loadState();
  state[`section-${idx}-collapsed`] = !state[`section-${idx}-collapsed`];
  saveState(state);
  render();
}

function resetAll() {
  if (confirm('Resetar todo o checklist? Isso não pode ser desfeito.')) {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }
}

function exportReport() {
  const state = loadState();
  const now = new Date().toISOString().replace('T', ' ').slice(0, 19);
  let report = `# SHMS Test Report — ${now}\n\n`;
  let total = 0, checked = 0;

  CHECKLIST.forEach(section => {
    report += `## ${section.icon} ${section.title}\n`;
    section.items.forEach(item => {
      total++;
      const p = state[item.id] ? '✅' : '❌';
      if (state[item.id]) checked++;
      const label = item.label.replace(/<[^>]+>/g, '');
      report += `- ${p} ${label}\n`;
    });
    report += '\n';
  });

  const pct = Math.round((checked / total) * 100);
  report = `> **Score: ${checked}/${total} (${pct}%)**\n\n` + report;

  const blob = new Blob([report], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `shms-test-report-${now.replace(/[: ]/g, '-')}.md`;
  a.click();
}

render();
</script>
